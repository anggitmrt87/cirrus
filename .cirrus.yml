env:
  TZ: "Asia/Jakarta"
  LANG: "C.UTF-8"
  LC_ALL: "C"
  
  # 🎯 Kernel Configuration
  DEVICE_CODENAME: "chime"
  BUILD_USER: "builder"
  BUILD_HOST: "mrtproject™"
  KERNEL_SOURCE: "https://github.com/anggitmrt87/valeryn_xiaomi_sm6115"
  KERNEL_BRANCH: "android16"
  DEVICE_DEFCONFIG: "vendor/bengal-perf_defconfig vendor/xiaomi/lime.config vendor/kernelsu.config"
  ANYKERNEL: "https://github.com/anggitmrt87/AnyKernel3.git"
  ANYKERNEL_BRANCH: "master"
  ARCH: "arm64"
  
  # 🔐 Telegram Encrypted Secrets
  TG_TOKEN: "ENCRYPTED[d9185ab32fea60b59b9caac7865c156001691d0c6c87c825c32a3db288ed566a8ac07cfe7ff445fb2c0e61f57c06b486]"
  TG_CHAT_ID: "ENCRYPTED[d1175d4be5c2ebcb2ce25c91ec7c71abeb738d22d563c4fc0afdb9f528c2d6997b98e29309468198038eb159cc709e91]"

  # ⚙️ Toolchain Configuration
  USE_CLANG: "aosp" # "aosp" or "greenforce"
  CLANG_ROOTDIR: "$CIRRUS_WORKING_DIR/clang"
  GCC32_ROOTDIR: "$CIRRUS_WORKING_DIR/gcc32"
  GCC64_ROOTDIR: "$CIRRUS_WORKING_DIR/gcc64"
  AOSP_CLANG_URL: "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/9b144befdfd93b90e02c663504fb9f4b95f9faf8/clang-r596125.tar.gz"

  # 🔧 Kernel Build Configuration
  TYPE_IMAGE: "Image.gz"
  BUILD_DTBO: "true"
  DISABLE_LOCALVERSION_ST: "true"
  INCLUDE_DTB: "true"
  DTB_PATH: "arch/arm64/boot/dts/vendor/qcom/bengal.dtb"

  # ⚡ Kernel SU configuration
  KERNELSU: "true"
  KERNELSU_TYPE: "rksu"
  KERNELSU_BRANCH: "main"
  KPM_PATCH: "false"
  KPM_VERSION: "0.13.0"

  # 🚀 Build Optimization
  BUILD_OPTIONS: "-j8"
  CCACHE: "false"
  CCACHE_DIR: "/tmp/ccache"
  CCACHE_MAXSIZE: "10G"
  
  # 📊 Enhanced Logging and Debugging
  DEBUG_MODE: "false"
  KEEP_BUILD_LOGS: "false"

task:
  name: "🚀 Kernel Build Process"
  timeout_in: 3h
  container:
    image: mhmmdfdlyas/dockerfile:k-ubuntu
    cpu: 8
    memory: 32G

  # 💾 Cache Configuration (akan tetap di-cache meskipun CCACHE=false, berguna jika nanti diaktifkan)
  ccache_cache:
    folder: /tmp/ccache

  update_script:
    - echo "🔄 Updating System Packages..."
    - apt-get update -qq
    - apt-get install -y aria2 ccache libssl-dev ncurses-dev flex bison cpio xz-utils locales libtinfo6
    - echo "🌍 Setting up locale..."
    - echo 'en_US.UTF-8 UTF-8' > /etc/locale.gen && /usr/sbin/locale-gen
    - echo "🕐 Setting timezone to $TZ..."
    - ln -snf /usr/share/zoneinfo/"$TZ" /etc/localtime && echo "$TZ" > /etc/timezone
    - apt-get clean
    - echo "✅ System setup completed!"

  sync_script:
    - echo "📥 Starting source download..."
    - chmod +x download.sh
    - ./download.sh

  build_script:
    - echo "🔨 Starting build process..."
    - chmod +x build.sh
    - ./build.sh
